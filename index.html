<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JyotishAI — Kundali & Career Oracle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink: #0a0608;
  --gold: #c9963a;
  --gold-light: #e8c87a;
  --gold-pale: #f5e9c8;
  --cream: #faf5ec;
  --parchment: #f0e6d0;
  --rust: #8b3a2f;
  --indigo: #1a1240;
  --indigo-mid: #2d2060;
  --violet: #5b3fa0;
  --muted: #6b5c4e;
  --border: rgba(201,150,58,0.25);
  --glow: rgba(201,150,58,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--indigo);
  color:var(--cream);
  font-family:'Syne',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── Stars background ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(91,63,160,0.4) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139,58,47,0.2) 0%, transparent 50%),
    radial-gradient(ellipse 40% 60% at 0% 60%, rgba(26,18,64,0.8) 0%, transparent 50%);
  pointer-events:none;z-index:0;
}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--del,0s)}
@keyframes twinkle{0%,100%{opacity:var(--min,0.1)}50%{opacity:var(--max,0.9)}}

/* ── Layout ── */
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:2rem 1.5rem 4rem}

/* ── Header ── */
header{text-align:center;padding:3rem 0 2rem;position:relative}
.brand-symbol{
  width:72px;height:72px;margin:0 auto 1.5rem;
  background:linear-gradient(135deg,var(--gold) 0%,var(--rust) 100%);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:2rem;box-shadow:0 0 40px rgba(201,150,58,0.4);
  position:relative;
}
.brand-symbol::after{
  content:'';position:absolute;inset:-6px;border-radius:50%;
  border:1px solid var(--border);animation:pulse-ring 3s ease-in-out infinite;
}
@keyframes pulse-ring{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.08);opacity:1}}
h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.2rem,5vw,3.5rem);
  font-weight:300;letter-spacing:0.04em;
  background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 50%,var(--cream) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.1;margin-bottom:0.5rem;
}
.subtitle{font-size:0.8rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);opacity:0.8}
.divider{
  display:flex;align-items:center;gap:1rem;margin:1.5rem auto;max-width:400px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{color:var(--gold);font-size:0.9rem;opacity:0.7}

/* ── Form card ── */
.card{
  background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.01) 100%);
  border:1px solid var(--border);border-radius:16px;
  padding:2rem 2.5rem;backdrop-filter:blur(10px);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:-50%;right:-30%;
  width:60%;height:200%;
  background:radial-gradient(ellipse,rgba(201,150,58,0.05) 0%,transparent 70%);
  pointer-events:none;
}
.card-title{
  font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;
  color:var(--gold-light);margin-bottom:1.5rem;display:flex;align-items:center;gap:0.6rem;
}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.field{display:flex;flex-direction:column;gap:0.4rem}
.field label{font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);opacity:0.8}
.field input,.field select{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);border-radius:8px;
  color:var(--cream);font-family:'Syne',sans-serif;font-size:0.9rem;
  padding:0.65rem 1rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;
}
.field input:focus,.field select:focus{
  border-color:rgba(201,150,58,0.6);
  box-shadow:0 0 0 3px rgba(201,150,58,0.08);
}
.field select option{background:var(--indigo);color:var(--cream)}
.full{grid-column:1/-1}

/* ── Rashis grid ── */
.rashi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;margin-top:0.5rem}
.rashi-btn{
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:8px;padding:0.5rem 0.3rem;cursor:pointer;
  text-align:center;transition:all 0.2s;color:var(--cream);font-size:0.78rem;
  font-family:'Syne',sans-serif;
}
.rashi-btn:hover{background:rgba(201,150,58,0.12);border-color:rgba(201,150,58,0.5)}
.rashi-btn.active{background:rgba(201,150,58,0.2);border-color:var(--gold);color:var(--gold-light)}
.rashi-symbol{font-size:1.1rem;display:block;margin-bottom:2px}

/* ── CTA Button ── */
.cta-wrap{margin-top:2rem;display:flex;gap:1rem;flex-wrap:wrap}
.btn-primary{
  flex:1;min-width:200px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--rust) 100%);
  color:#fff;font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:600;
  letter-spacing:0.12em;text-transform:uppercase;
  border:none;border-radius:8px;padding:1rem 2rem;cursor:pointer;
  position:relative;overflow:hidden;transition:transform 0.15s,box-shadow 0.15s;
  box-shadow:0 4px 20px rgba(201,150,58,0.3);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,150,58,0.4)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-primary .shine{
  position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.2) 50%,transparent 60%);
  transform:translateX(-100%);
}
.btn-primary:hover .shine{animation:shine 0.6s ease forwards}
@keyframes shine{to{transform:translateX(200%)}}

/* ── Loading ── */
.loading-state{
  text-align:center;padding:3rem 1rem;
  display:none;flex-direction:column;align-items:center;gap:1rem;
}
.loading-state.active{display:flex}
.mandala-spin{
  width:64px;height:64px;
  border:2px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin 1.2s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--gold-light);font-style:italic}

/* ── Results ── */
#results{margin-top:2rem;display:none}
#results.show{display:block;animation:fadeUp 0.6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.result-header{
  text-align:center;padding:2.5rem 2rem 2rem;
  background:linear-gradient(135deg,rgba(201,150,58,0.08) 0%,rgba(91,63,160,0.08) 100%);
  border:1px solid var(--border);border-radius:16px;margin-bottom:1.5rem;
}
.result-name{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--gold-light)}
.result-meta{font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-top:0.5rem}
.planets-row{display:flex;flex-wrap:wrap;justify-content:center;gap:0.6rem;margin-top:1.2rem}
.planet-chip{
  background:rgba(201,150,58,0.1);border:1px solid var(--border);
  border-radius:20px;padding:0.3rem 0.8rem;font-size:0.75rem;color:var(--gold);
}

.section-block{
  background:linear-gradient(135deg,rgba(255,255,255,0.03) 0%,rgba(255,255,255,0.01) 100%);
  border:1px solid var(--border);border-radius:12px;
  padding:1.5rem 2rem;margin-bottom:1.2rem;
  animation:fadeUp 0.5s ease both;
}
.section-block:nth-child(1){animation-delay:0.1s}
.section-block:nth-child(2){animation-delay:0.2s}
.section-block:nth-child(3){animation-delay:0.3s}
.section-block:nth-child(4){animation-delay:0.4s}
.section-block:nth-child(5){animation-delay:0.5s}

.section-icon{font-size:1.5rem;margin-bottom:0.8rem;display:block}
.section-heading{
  font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;
  color:var(--gold-light);margin-bottom:1rem;padding-bottom:0.6rem;
  border-bottom:1px solid var(--border);
}
.prose{
  font-family:'Cormorant Garamond',serif;font-size:1.05rem;line-height:1.85;
  color:rgba(245,233,200,0.88);
}
.prose strong{color:var(--gold-light);font-weight:600}
.prose em{color:var(--gold);font-style:italic}

.career-paths{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:0.8rem;margin-top:1rem}
.career-path{
  background:rgba(91,63,160,0.2);border:1px solid rgba(91,63,160,0.4);
  border-radius:8px;padding:0.8rem 1rem;
  font-size:0.85rem;color:var(--cream);text-align:center;
}
.career-path .icon{font-size:1.4rem;margin-bottom:0.4rem;display:block}

.yearly-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-top:1rem}
.year-card{
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  border-radius:8px;padding:0.8rem;
}
.year-label{font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem}
.year-text{font-family:'Cormorant Garamond',serif;font-size:0.95rem;color:var(--cream);line-height:1.6}

.gem-row{display:flex;flex-wrap:wrap;gap:0.6rem;margin-top:0.8rem}
.gem{
  padding:0.3rem 0.9rem;border-radius:20px;font-size:0.8rem;font-weight:500;
}
.gem-lucky{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#86efac}
.gem-avoid{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5}

.pdf-btn{
  display:flex;align-items:center;justify-content:center;gap:0.6rem;
  background:transparent;border:1px solid var(--border);
  color:var(--gold);font-family:'Syne',sans-serif;font-size:0.8rem;
  letter-spacing:0.1em;text-transform:uppercase;border-radius:8px;
  padding:0.75rem 1.5rem;cursor:pointer;transition:all 0.2s;width:100%;margin-top:1.5rem;
}
.pdf-btn:hover{background:rgba(201,150,58,0.08);border-color:rgba(201,150,58,0.5)}

.error-msg{
  background:rgba(139,58,47,0.15);border:1px solid rgba(139,58,47,0.4);
  border-radius:10px;padding:1rem 1.5rem;color:#fca5a5;
  font-size:0.9rem;margin-top:1rem;display:none;
}
.error-msg.show{display:block}

/* ── Nakshatra wheel decoration ── */
.wheel-wrap{text-align:center;margin:1.5rem 0}
.wheel-wrap svg{max-width:280px;width:100%;opacity:0.6}

/* responsive */
@media(max-width:600px){
  .grid-2,.grid-3{grid-template-columns:1fr}
  .rashi-grid{grid-template-columns:repeat(3,1fr)}
  .card{padding:1.5rem 1.2rem}
  .yearly-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="stars"></div>

<div class="wrap">
  <header>
    <div class="brand-symbol">🔯</div>
    <h1>JyotishAI</h1>
    <p class="subtitle">Vedic Astrology · AI Career Oracle · Life Path Guidance</p>
    <div class="divider"><span>✦</span></div>
    <p style="font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:rgba(245,233,200,0.7);font-style:italic;max-width:500px;margin:0 auto">
      Ancient cosmic wisdom meets modern artificial intelligence — discover your destined career path
    </p>
  </header>

  <!-- Input Form -->
  <div class="card" id="form-card">
    <div class="card-title">🪐 Your Birth Details</div>
    <div style="display:grid;gap:1rem">
      <div class="grid-2">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Your full name" autocomplete="off"/>
        </div>
        <div class="field">
          <label>Date of Birth</label>
          <input type="date" id="dob"/>
        </div>
      </div>
      <div class="grid-3">
        <div class="field">
          <label>Birth Time</label>
          <input type="time" id="tob"/>
        </div>
        <div class="field full" style="grid-column:span 2">
          <label>Birth Place (City, Country)</label>
          <input type="text" id="place" placeholder="e.g. Dadri, Uttar Pradesh, India"/>
        </div>
      </div>

      <div class="field">
        <label>Select Your Rashi (Moon Sign) — or we'll calculate it</label>
        <div class="rashi-grid" id="rashi-grid">
          <button class="rashi-btn" data-rashi="Aries"><span class="rashi-symbol">♈</span>Mesh</button>
          <button class="rashi-btn" data-rashi="Taurus"><span class="rashi-symbol">♉</span>Vrishabh</button>
          <button class="rashi-btn" data-rashi="Gemini"><span class="rashi-symbol">♊</span>Mithun</button>
          <button class="rashi-btn" data-rashi="Cancer"><span class="rashi-symbol">♋</span>Karka</button>
          <button class="rashi-btn" data-rashi="Leo"><span class="rashi-symbol">♌</span>Simha</button>
          <button class="rashi-btn" data-rashi="Virgo"><span class="rashi-symbol">♍</span>Kanya</button>
          <button class="rashi-btn" data-rashi="Libra"><span class="rashi-symbol">♎</span>Tula</button>
          <button class="rashi-btn" data-rashi="Scorpio"><span class="rashi-symbol">♏</span>Vrishchik</button>
          <button class="rashi-btn" data-rashi="Sagittarius"><span class="rashi-symbol">♐</span>Dhanu</button>
          <button class="rashi-btn" data-rashi="Capricorn"><span class="rashi-symbol">♑</span>Makar</button>
          <button class="rashi-btn" data-rashi="Aquarius"><span class="rashi-symbol">♒</span>Kumbh</button>
          <button class="rashi-btn" data-rashi="Pisces"><span class="rashi-symbol">♓</span>Meen</button>
        </div>
      </div>

      <div class="grid-2">
        <div class="field">
          <label>Current Career / Field</label>
          <input type="text" id="career" placeholder="e.g. Software Engineer, IT"/>
        </div>
        <div class="field">
          <label>Years of Experience</label>
          <select id="experience">
            <option value="">Select...</option>
            <option value="0-2">0–2 years (fresher)</option>
            <option value="3-5">3–5 years</option>
            <option value="6-10">6–10 years</option>
            <option value="11-15" selected>11–15 years (senior)</option>
            <option value="15+">15+ years (veteran)</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Career Goals / What you seek guidance on</label>
        <input type="text" id="goals" placeholder="e.g. Should I start my own business? Which domain to focus on?"/>
      </div>
    </div>

    <div class="cta-wrap">
      <button class="btn-primary" id="generate-btn" onclick="generateKundali()">
        <span class="shine"></span>
        ✨ Reveal My Kundali & Career Path
      </button>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- Loading -->
  <div class="loading-state" id="loading">
    <div class="mandala-spin"></div>
    <div class="loading-msg" id="loading-msg">Reading the celestial positions...</div>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="result-header" id="result-header"></div>
    <div id="result-sections"></div>
    <button class="pdf-btn" onclick="downloadPDF()">⬇ Download PDF Report</button>
  </div>
</div>

<script>
// Stars
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s=document.createElement('div');
    s.className='star';
    const size=Math.random()*2.5+0.5;
    s.style.cssText=`
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      --d:${2+Math.random()*4}s;--del:${Math.random()*5}s;
      --min:${0.05+Math.random()*0.1};--max:${0.4+Math.random()*0.6};
    `;
    c.appendChild(s);
  }
})();

// Rashi selection
let selectedRashi='';
document.querySelectorAll('.rashi-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.rashi-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    selectedRashi=b.dataset.rashi;
  });
});

const loadingMessages=[
  'Reading the celestial positions...',
  'Calculating your Lagna and Navamsa...',
  'Consulting Brihaspati (Jupiter) for career insights...',
  'Mapping your Dasha periods...',
  'Weaving cosmic wisdom with AI intelligence...',
  'Almost ready — the stars are aligned...'
];

async function generateKundali(){
  const name=document.getElementById('name').value.trim();
  const dob=document.getElementById('dob').value;
  const tob=document.getElementById('tob').value;
  const place=document.getElementById('place').value.trim();
  const career=document.getElementById('career').value.trim();
  const exp=document.getElementById('experience').value;
  const goals=document.getElementById('goals').value.trim();

  if(!name||!dob||!place){
    showError('Please fill in at least your Name, Date of Birth, and Birth Place.');
    return;
  }

  document.getElementById('error-msg').classList.remove('show');
  document.getElementById('generate-btn').disabled=true;
  document.getElementById('form-card').style.opacity='0.5';
  document.getElementById('loading').classList.add('active');
  document.getElementById('results').classList.remove('show');

  let msgIdx=0;
  const msgInterval=setInterval(()=>{
    msgIdx=(msgIdx+1)%loadingMessages.length;
    document.getElementById('loading-msg').textContent=loadingMessages[msgIdx];
  },2200);

  const prompt=`You are JyotishAI — an expert in both Vedic astrology (Jyotish) AND modern career counseling. You combine authentic astrological knowledge with practical, realistic career advice.

USER DETAILS:
- Name: ${name}
- Date of Birth: ${dob}
- Time of Birth: ${tob||'Unknown'}
- Birth Place: ${place}
- Rashi (if selected): ${selectedRashi||'Calculate based on DOB'}
- Current Career/Field: ${career||'Not specified'}
- Experience: ${exp||'Not specified'}
- Career Question/Goals: ${goals||'General guidance'}

Generate a comprehensive Vedic Kundali + Career Guidance report. Structure your response as JSON with these exact keys:

{
  "rashi": "Moon Sign name in English and Sanskrit",
  "lagna": "Ascendant sign",
  "nakshatra": "Birth star / Nakshatra",
  "ruling_planet": "Main ruling planet",
  "planets": ["array of 5-6 key planetary positions like 'Sun in Gemini', 'Jupiter in 10th house'"],
  "personality": "3-4 sentences about core personality, strengths and nature based on birth chart. Use vivid astrological language mixed with practical insight.",
  "career_analysis": "4-5 sentences deep career analysis based on 10th house, ruling planets, and current career. Be specific and realistic. Mention actual astrological factors.",
  "ideal_careers": [
    {"icon": "emoji", "title": "Career title", "reason": "1 sentence why this fits their chart"},
    {"icon": "emoji", "title": "Career title", "reason": "1 sentence why"},
    {"icon": "emoji", "title": "Career title", "reason": "1 sentence why"},
    {"icon": "emoji", "title": "Career title", "reason": "1 sentence why"},
    {"icon": "emoji", "title": "Career title", "reason": "1 sentence why"},
    {"icon": "emoji", "title": "Career title", "reason": "1 sentence why"}
  ],
  "yearly_forecast": [
    {"year": "2025", "label": "Theme for the year", "text": "2 sentences forecast"},
    {"year": "2026", "label": "Theme for the year", "text": "2 sentences forecast"},
    {"year": "2027", "label": "Theme for the year", "text": "2 sentences forecast"},
    {"year": "2028", "label": "Theme for the year", "text": "2 sentences forecast"}
  ],
  "lucky_gems": ["Gemstone 1", "Gemstone 2"],
  "avoid_gems": ["Gemstone to avoid"],
  "lucky_numbers": [3, 7, 9],
  "lucky_colors": ["Color1", "Color2"],
  "mantra": "A relevant Sanskrit mantra for career success",
  "mantra_meaning": "English meaning of the mantra",
  "action_plan": "4-5 sentences of concrete, actionable career advice specifically tailored to their experience level and goals. This should be the MOST PRACTICAL section — real steps they can take this year.",
  "special_yoga": "Name and description of any special planetary yoga in their chart that affects career (Raj Yoga, Gaj Kesari, etc.)"
}

IMPORTANT: Make it feel authentic — use real Jyotish terminology (Lagna, Dasha, Bhava, Graha, etc.) but also give genuinely useful career advice. The career advice should be practical and match their ${exp} years of experience. Respond ONLY with valid JSON.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        messages:[{role:'user',content:prompt}]
      })
    });

    clearInterval(msgInterval);
    const data=await res.json();

    if(!res.ok){
      throw new Error(data.error?.message||'API error');
    }

    let raw=data.content[0].text.trim();
    raw=raw.replace(/```json|```/g,'').trim();
    const r=JSON.parse(raw);

    renderResults(name,dob,place,r);

  }catch(err){
    clearInterval(msgInterval);
    showError('Error: '+err.message+'. Please check your API connection and try again.');
  }finally{
    document.getElementById('loading').classList.remove('active');
    document.getElementById('generate-btn').disabled=false;

  }
}

function showError(msg){
  const el=document.getElementById('error-msg');
  el.textContent=msg;el.classList.add('show');
  document.getElementById('loading').classList.remove('active');
  document.getElementById('generate-btn').disabled=false;
  document.getElementById('form-card').style.opacity='1';
}
